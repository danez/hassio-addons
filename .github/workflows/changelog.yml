name: "Renovate — update addon changelogs"

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  update-changelogs:
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          token: ${{ secrets.CHANGELOG_TOKEN }}
          ref: ${{ github.head_ref }}

      - name: Skip if last commit authored by changelog bot
        id: skip
        run: |
          set -euo pipefail
          # Get author email of latest commit on the checked-out head
          SKIP=false
          LAST_AUTHOR_EMAIL=$(git log -1 --pretty=format:%ae || echo "")
          if [ "$LAST_AUTHOR_EMAIL" = "120286224+danez-bot@users.noreply.github.com" ]; then
            echo "Last commit authored by changelog bot, skipping workflow."
            SKIP=true
          fi
          echo "skip=$SKIP" >> $GITHUB_OUTPUT

      - name: Set up Git user
        if: steps.skip.outputs.skip != 'true'
        run: |
          git config user.name "danez-bot"
          git config user.email "120286224+danez-bot@users.noreply.github.com"

      - name: Determine changed files vs base
        if: steps.skip.outputs.skip != 'true'
        id: changed
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          echo "Base ref: $BASE"
          # Fetch the base branch for diffing
          git fetch origin "$BASE":"refs/remotes/origin/$BASE" --no-tags
          CHANGED_FILES=$(git diff --name-only "refs/remotes/origin/$BASE"...HEAD || true)
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Find affected addon directories
        if: steps.skip.outputs.skip != 'true'
        id: addons
        run: |
          changed="${{ steps.changed.outputs.changed_files }}"
          echo "Changed files:"
          echo "$changed"
          # Collect unique top-level directories from changed paths
          addons=""
          while IFS= read -r f; do
            # skip empty lines
            [ -z "$f" ] && continue
            # get top-level directory (first path component)
            top=$(echo "$f" | sed -E 's|^([^/.]+).*|\1|')
            # only include addon directories
            if [ -d "$top" ] && [ -f "$top/config.yaml" ]; then
              case " $addons " in
                *" $top "*) ;;
                *) addons="$addons $top";;
              esac
            fi
          done <<EOF
          $changed
          EOF
          # Trim leading space
          addons="$(echo "$addons" | sed -E 's/^[[:space:]]+//')"
          echo "addons=$addons" >> $GITHUB_OUTPUT
          echo "Found addons: $addons"

      - name: Update addon versions and changelogs
        if: steps.skip.outputs.skip != 'true'
        id: update
        run: |
          set -euo pipefail
          IFS=' ' read -r -a ADDON_ARRAY <<< "${{ steps.addons.outputs.addons }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUM="${{ github.event.pull_request.number }}"

          if echo "$PR_TITLE" | grep -Eiq '^[[:space:]]*feat(\([^)]+\))?:'; then
            BUMP_TYPE="minor"
          else
            BUMP_TYPE="patch"
          fi

          # Strip conventional commit prefix (feat:, fix(scope):, chore!, etc.)
          CLEAN_TITLE="$(echo "$PR_TITLE" | sed -E 's/^[[:space:]]*(feat|fix|chore|docs|style|refactor|perf|test|build|ci|revert|release|deps)(\([^)]+\))?(!)?:[[:space:]]*//I')"
          if [ "$CLEAN_TITLE" = "$PR_TITLE" ]; then
            CLEAN_TITLE="$PR_TITLE"
          fi
          ENTRY="- ${CLEAN_TITLE} (#${PR_NUM})"
          echo "PR title: $PR_TITLE"
          echo "Version bump: $BUMP_TYPE"
          echo "Cleaned title: $CLEAN_TITLE"
          echo "Entry to add: $ENTRY"
          changed_any=false

          for addon in "${ADDON_ARRAY[@]}"; do
            [ -z "$addon" ] && continue
            config_file="$addon/config.yaml"
            changelog_file="$addon/CHANGELOG.md"

            if ! [ -f "$config_file" ]; then
              echo "Skipping $addon: missing config.yaml"
              continue
            fi

            echo "Updating addon: $addon"

            current_version="$(sed -nE 's/^version:[[:space:]]*["'\'' ]*([0-9]+\.[0-9]+\.[0-9]+)["'\'' ]*$/\1/p' "$config_file" | head -n 1)"
            if [ -z "$current_version" ]; then
              echo "Skipping $addon: could not determine version from $config_file"
              continue
            fi

            IFS='.' read -r major minor patch <<< "$current_version"
            if [ "$BUMP_TYPE" = "minor" ]; then
              minor=$((minor + 1))
              patch=0
            else
              patch=$((patch + 1))
            fi
            new_version="$major.$minor.$patch"

            sed -E -i.bak "s/^(version:[[:space:]]*[\"']?)[0-9]+\.[0-9]+\.[0-9]+([\"']?.*)$/\\1${new_version}\\2/" "$config_file"
            rm -f "$config_file.bak"

            echo "New version for $addon: $new_version"

            if [ -f "$changelog_file" ]; then
              tmp="$(mktemp)"
              {
                echo "# $new_version"
                echo ""
                echo "$ENTRY"
                echo ""
                cat "$changelog_file"
              } > "$tmp"
              mv "$tmp" "$changelog_file"
            else
              {
                echo "# $new_version"
                echo ""
                echo "$ENTRY"
              } > "$changelog_file"
            fi

            git add "$config_file" "$changelog_file"
            changed_any=true
          done

          if [ "$changed_any" = "true" ]; then
            git commit -m "chore(changelog): bump addon versions"
            # Push back to the PR branch
            git push origin "HEAD:${{ github.head_ref }}"
            echo "Pushed addon version and changelog updates."
          else
            echo "No addon updates needed."
          fi
